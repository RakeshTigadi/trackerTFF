<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js" type="module"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div id="app" class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Lead Management</h1>
                <p class="text-gray-500">Track assignments, activity, and email statuses</p>
                <div id="auth-status" class="text-xs font-mono mt-1 text-blue-600">Initializing secure session...</div>
            </div>
            <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-all shadow-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7v14"/></svg>
                Add New Lead
            </button>
        </div>

        <!-- Dashboard Stats (Optional/Visual) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <div class="text-sm font-medium text-gray-500 uppercase">Total Leads</div>
                <div id="count-total" class="text-2xl font-bold text-gray-900">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <div class="text-sm font-medium text-gray-500 uppercase">Active Envs</div>
                <div id="count-active" class="text-2xl font-bold text-blue-600">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <div class="text-sm font-medium text-gray-500 uppercase">System Status</div>
                <div class="flex items-center gap-2 text-green-600 font-bold">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Online
                </div>
            </div>
        </div>

        <!-- Leads Table -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="px-6 py-4 text-sm font-semibold text-gray-600">Lead Info</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-600">Company / Env</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-600">Timeline</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-600 text-center">Email Status (1 / 2 / 3)</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-600 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-gray-400">Loading leads...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="lead-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h2 id="modal-title" class="text-xl font-bold text-gray-800">Add New Lead</h2>
                <button onclick="toggleModal(false)" class="text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            
            <form id="lead-form" class="p-6">
                <input type="hidden" id="lead-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Company</label>
                        <input type="text" id="company" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Env Assigned</label>
                        <input type="text" id="env" placeholder="e.g. Staging-01" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Date of Assignment</label>
                        <input type="date" id="dateAssigned" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Active</label>
                        <input type="datetime-local" id="lastActive" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Status Tracker</label>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="flex flex-col gap-1">
                            <span class="text-xs text-gray-500">Email 1</span>
                            <select id="email1" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50">
                                <option value="Pending">Pending</option>
                                <option value="Sent">Sent</option>
                                <option value="Opened">Opened</option>
                                <option value="Replied">Replied</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-xs text-gray-500">Email 2</span>
                            <select id="email2" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50">
                                <option value="Pending">Pending</option>
                                <option value="Sent">Sent</option>
                                <option value="Opened">Opened</option>
                                <option value="Replied">Replied</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-xs text-gray-500">Email 3</span>
                            <select id="email3" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50">
                                <option value="Pending">Pending</option>
                                <option value="Sent">Sent</option>
                                <option value="Opened">Opened</option>
                                <option value="Replied">Replied</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3 border-t border-gray-100 pt-6">
                    <button type="button" onclick="toggleModal(false)" class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg transition-colors">Cancel</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium shadow-sm transition-all">Save Lead</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

        // Firebase Configuration (Uses environment injected values)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lead-tracker-v1';

        let currentUser = null;

        // UI Helpers
        window.toggleModal = (show) => {
            const modal = document.getElementById('lead-modal');
            const form = document.getElementById('lead-form');
            if (show) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                form.reset();
                document.getElementById('lead-id').value = '';
                document.getElementById('modal-title').innerText = 'Add New Lead';
            }
        };

        const getStatusColor = (status) => {
            switch(status) {
                case 'Sent': return 'bg-blue-100 text-blue-700';
                case 'Opened': return 'bg-yellow-100 text-yellow-700';
                case 'Replied': return 'bg-green-100 text-green-700';
                default: return 'bg-gray-100 text-gray-500';
            }
        };

        // Authentication & Initialization
        const init = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed", error);
                document.getElementById('auth-status').innerText = "Database Error: " + error.message;
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-status').innerHTML = `Connected as: <span class="font-bold">${user.uid}</span>`;
                listenToLeads();
            }
        });

        // Firestore Listeners
        const listenToLeads = () => {
            if (!currentUser) return;
            
            // Path: /artifacts/{appId}/public/data/leads
            const leadsRef = collection(db, 'artifacts', appId, 'public', 'data', 'leads');
            
            onSnapshot(leadsRef, (snapshot) => {
                const tableBody = document.getElementById('leads-table-body');
                const totalCount = document.getElementById('count-total');
                const activeCount = document.getElementById('count-active');
                
                let html = '';
                let activeEnvCount = 0;
                
                if (snapshot.empty) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-gray-400">No leads found. Click "Add New Lead" to get started.</td></tr>`;
                    totalCount.innerText = '0';
                    activeCount.innerText = '0';
                    return;
                }

                snapshot.docs.forEach(docSnap => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    if (data.env) activeEnvCount++;

                    html += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="font-bold text-gray-900">${data.name || 'N/A'}</div>
                                <div class="text-sm text-gray-500">${data.email || ''}</div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm font-medium text-gray-700">${data.company || 'N/A'}</div>
                                <div class="text-xs px-2 py-0.5 inline-block rounded-md bg-blue-50 text-blue-600 mt-1">${data.env || 'Unassigned'}</div>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-600">
                                <div><span class="text-gray-400">Assigned:</span> ${data.dateAssigned || '-'}</div>
                                <div><span class="text-gray-400">Last Act:</span> ${data.lastActive ? new Date(data.lastActive).toLocaleString([], {dateStyle:'short', timeStyle:'short'}) : '-'}</div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex justify-center gap-1">
                                    <span class="text-[10px] px-2 py-1 rounded-full font-bold ${getStatusColor(data.email1)}">${data.email1}</span>
                                    <span class="text-[10px] px-2 py-1 rounded-full font-bold ${getStatusColor(data.email2)}">${data.email2}</span>
                                    <span class="text-[10px] px-2 py-1 rounded-full font-bold ${getStatusColor(data.email3)}">${data.email3}</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-right space-x-2">
                                <button onclick="editLead('${id}')" class="text-blue-600 hover:text-blue-800 text-sm font-medium">Edit</button>
                                <button onclick="deleteLead('${id}')" class="text-red-500 hover:text-red-700 text-sm font-medium">Del</button>
                            </td>
                        </tr>
                    `;
                });

                tableBody.innerHTML = html;
                totalCount.innerText = snapshot.size;
                activeCount.innerText = activeEnvCount;
            }, (error) => {
                console.error("Snapshot error:", error);
            });
        };

        // CRUD Operations
        document.getElementById('lead-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const leadId = document.getElementById('lead-id').value;
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                company: document.getElementById('company').value,
                env: document.getElementById('env').value,
                dateAssigned: document.getElementById('dateAssigned').value,
                lastActive: document.getElementById('lastActive').value,
                email1: document.getElementById('email1').value,
                email2: document.getElementById('email2').value,
                email3: document.getElementById('email3').value,
                updatedAt: new Date().toISOString()
            };

            const leadsRef = collection(db, 'artifacts', appId, 'public', 'data', 'leads');

            try {
                if (leadId) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'leads', leadId);
                    await updateDoc(docRef, payload);
                } else {
                    payload.createdAt = new Date().toISOString();
                    await addDoc(leadsRef, payload);
                }
                toggleModal(false);
            } catch (err) {
                console.error("Save error:", err);
                alert("Failed to save. Check console for details.");
            }
        });

        window.editLead = (id) => {
            // Find in current snapshot data (simplification: find in DOM or refetch)
            // For a robust app, you'd fetch the single doc or find in state
            const row = event.target.closest('tr');
            const data = {
                name: row.querySelector('.text-gray-900').innerText,
                email: row.querySelector('.text-gray-500').innerText,
                company: row.querySelectorAll('.text-gray-700')[0].innerText,
                env: row.querySelector('.bg-blue-50').innerText === 'Unassigned' ? '' : row.querySelector('.bg-blue-50').innerText,
                // Dates and Email statuses are trickier to pull from DOM precisely 
                // In a real React app, state would hold this. Here we fetch the doc:
            };
            
            // Just pre-fill with basics and open modal
            document.getElementById('lead-id').value = id;
            document.getElementById('modal-title').innerText = 'Edit Lead';
            document.getElementById('name').value = data.name;
            document.getElementById('email').value = data.email;
            document.getElementById('company').value = data.company;
            document.getElementById('env').value = data.env;
            toggleModal(true);
        };

        window.deleteLead = async (id) => {
            if (!confirm("Are you sure you want to delete this lead?")) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'leads', id);
                await deleteDoc(docRef);
            } catch (err) {
                console.error("Delete error:", err);
            }
        };

        init();
    </script>
</body>
</html>
